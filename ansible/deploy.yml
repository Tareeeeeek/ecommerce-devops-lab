---
# =================================================================
# ÉTAPE PRÉALABLE : Installation des prérequis Python sans plantage
# =================================================================
- name: Pre-requisites installation
  hosts: all
  gather_facts: false # On désactive l'analyse pour éviter l'erreur JSON
  become: yes
  tasks:
    - name: Ensure python3 and simplejson are installed
      raw: dnf install -y python3 python3-pip || yum install -y python3 python3-pip || apt-get install -y python3 python3-simplejson
      changes_only: no

# =================================================================
# ÉTAPE PRINCIPALE : Déploiement de l'application E-Commerce
# =================================================================
- name: Deploy E-Commerce Application Stack
  hosts: all
  become: yes
  gather_facts: true # Maintenant qu'on a réparé Python, on peut l'activer sans risque
  vars:
    # Définition des versions et configurations de l'application
    app_dir: "/home/ec2-user/ecommerce-app"

  tasks:
    # -------------------------------------------------------------
    # ÉTAPES D'INSTALLATION DE DOCKER & DOCKER-COMPOSE
    # -------------------------------------------------------------
    - name: Update all packages (yum)
      yum:
        name: "*"
        state: latest

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Download Docker Compose v2
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    # -------------------------------------------------------------
    # PRÉPARATION DE L'APPLICATION (DOCKER-COMPOSE STATS)
    # -------------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Create docker-compose.yml configuration file
      copy:
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ec2-user
        group: ec2-user
        mode: '0644'
        content: |
          version: '3.8'

          services:
            # Base de données MongoDB
            mongodb:
              image: mongo:latest
              container_name: mongodb
              ports:
                - "27017:27017"
              volumes:
                - mongo_data:/data/db
              networks:
                - ecommerce_net

            # Application Node.js (Simulée pour le Lab avec PM2/Node)
            node_app:
              image: node:18-alpine
              container_name: node_app
              working_dir: /usr/src/app
              command: sh -c "npm install -g pm2 && echo 'const http = require(\"http\"); const server = http.createServer((req, res) => { res.writeHead(200, {\"Content-Type\": \"text/html\"}); res.end(\"<h1>E-Commerce Store</h1><ul><li>Laptop \$$1200</li><li>Phone \$$800</li></ul>\"); }); server.listen(3000, () => console.log(\"Server running on port 3000\"));' > app.js && pm2-runtime start app.js"
              ports:
                - "3000:3000"
              depends_on:
                - mongodb
              networks:
                - ecommerce_net

            # Reverse Proxy Nginx
            nginx:
              image: nginx:alpine
              container_name: nginx_proxy
              ports:
                - "80:80"
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
              depends_on:
                - node_app
              networks:
                - ecommerce_net

          volumes:
            mongo_data:

          networks:
            ecommerce_net:
              driver: bridge

    - name: Create nginx.conf configuration file
      copy:
        dest: "{{ app_dir }}/nginx.conf"
        owner: ec2-user
        group: ec2-user
        mode: '0644'
        content: |
          server {
              listen 80;
              server_name localhost;

              location / {
                  proxy_pass http://node_app:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    # -------------------------------------------------------------
    # LANCEMENT DE LA ARCHITECTURE APPLICATIVE
    # -------------------------------------------------------------
    - name: Tear down existing Docker Compose services (if any)
      shell: /usr/local/bin/docker-compose down
      args:
        chdir: "{{ app_dir }}"
      failed_when: false

    - name: Start stack using Docker Compose
      shell: /usr/local/bin/docker-compose up -d
      args:
        chdir: "{{ app_dir }}"
