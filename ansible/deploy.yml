---
- name: Deploy E-Commerce Application Stack
  hosts: all
  become: yes
  gather_facts: false

  vars:
    app_dir: "/home/ec2-user/ecommerce-app"

  tasks:
    # -------------------------------------------------------------
    # ÉTAPES D'INSTALLATION DE DOCKER & DOCKER-COMPOSE (VIA RAW)
    # -------------------------------------------------------------
    - name: Update all packages (yum)
      raw: yum update -y --skip-broken

    - name: Install Docker
      raw: yum install -y docker

    - name: Start and enable Docker service
      raw: systemctl start docker && systemctl enable docker

    - name: Add ec2-user to docker group
      raw: usermod -aG docker ec2-user

    - name: Download Docker Compose v2
      raw: curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose

    - name: Make Docker Compose executable
      raw: chmod +x /usr/local/bin/docker-compose

    # -------------------------------------------------------------
    # PRÉPARATION DE L'APPLICATION (VIA RAW)
    # -------------------------------------------------------------
    - name: Create application directory
      raw: mkdir -p "{{ app_dir }}" && honest_owner_var="{{ app_dir }}" && chown -R ec2-user:ec2-user $honest_owner_var

    - name: Create docker-compose.yml configuration file
      raw: |
        cat << 'EOF' > "{{ app_dir }}/docker-compose.yml"
        version: '3.8'

        services:
          mongodb:
            image: mongo:latest
            container_name: mongodb
            ports:
              - "27017:27017"
            volumes:
              - mongo_data:/data/db
            networks:
              - ecommerce_net

          node_app:
            image: node:18-alpine
            container_name: node_app
            working_dir: /usr/src/app
            command: sh -c "npm install -g pm2 && echo 'const http = require(\"http\"); const server = http.createServer((req, res) => { res.writeHead(200, {\"Content-Type\": \"text/html\"}); res.end(\"<h1>E-Commerce Store</h1><ul><li>Laptop \$$1200</li><li>Phone \$$800</li></ul>\"); }); server.listen(3000, () => console.log(\"Server running on port 3000\"));' > app.js && pm2-runtime start app.js"
            ports:
              - "3000:3000"
            depends_on:
              - mongodb
            networks:
              - ecommerce_net

          nginx:
            image: nginx:alpine
            container_name: nginx_proxy
            ports:
              - "80:80"
            volumes:
              - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            depends_on:
              - node_app
            networks:
              - ecommerce_net

        volumes:
          mongo_data:

        networks:
          ecommerce_net:
            driver: bridge
        EOF

    - name: Fix docker-compose.yml permissions
      raw: chown ec2-user:ec2-user "{{ app_dir }}/docker-compose.yml" && chmod 0644 "{{ app_dir }}/docker-compose.yml"

    - name: Create nginx.conf configuration file
      raw: |
        cat << 'EOF' > "{{ app_dir }}/nginx.conf"
        server {
            listen 80;
            server_name localhost;

            location / {
                proxy_pass http://node_app:3000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
        EOF

    - name: Fix nginx.conf permissions
      raw: chown ec2-user:ec2-user "{{ app_dir }}/nginx.conf" && chmod 0644 "{{ app_dir }}/nginx.conf"

    # -------------------------------------------------------------
    # LANCEMENT DE L'ARCHITECTURE APPLICATIVE (VIA RAW)
    # -------------------------------------------------------------
    - name: Tear down existing Docker Compose services (if any)
      raw: cd "{{ app_dir }}" && /usr/local/bin/docker-compose down
      failed_when: false

    - name: Start stack using Docker Compose
      raw: cd "{{ app_dir }}" && /usr/local/bin/docker-compose up -d
