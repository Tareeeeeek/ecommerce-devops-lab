name: Full DevOps Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Infrastructure Provisioning
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Extract EC2 IPs
        id: vars
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r '.[]')
          echo "IPS_LIST=$IPS" >> $GITHUB_ENV
          # Sauvegarde pour le job suivant
          echo "$IPS" > ../ansible/ips.txt
        working-directory: terraform

      - name: Upload IPs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ec2-ips
          path: ansible/ips.txt

  ansible:
    name: Configuration Management
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download IPs Artifact
        uses: actions/download-artifact@v4
        with:
          name: ec2-ips
          path: ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Generate Dynamic Inventory
        run: |
          echo "[web_servers]" > inventory.ini
          while read -r ip; do
            echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
          done < ips.txt
          cat inventory.ini
        working-directory: ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini deploy.yml
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
